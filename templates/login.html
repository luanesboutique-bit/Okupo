<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingresar - Okupo</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --color-crema: #fdfaf5;
            --color-texto: #5a3e2b;
            --color-dorado: #d4af37;
        }

        body {
            background-color: var(--color-crema);
            background-image: url('https://www.transparenttextures.com/patterns/cream-paper.png');
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--color-texto);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            background: white;
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            border: 1px solid #eee;
        }

        .logo {
            font-size: 40px;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        h2 {
            font-size: 20px;
            margin-bottom: 30px;
            opacity: 0.7;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            margin-left: 5px;
        }

        .input-group input {
            width: 100%;
            padding: 15px 20px;
            border-radius: 15px;
            border: 1px solid #ddd;
            background: #f9f9f9;
            box-sizing: border-box;
            font-size: 16px;
        }

        .input-group input:focus {
            border-color: var(--color-texto);
            outline: none;
            background: white;
        }

        .btn-login {
            width: 100%;
            padding: 18px;
            background-image: url('/static/madera_media.jpg');
            background-size: cover;
            border: none;
            border-radius: 15px;
            color: var(--color-texto);
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            margin-top: 10px;
        }

        .error-msg {
            background: #fee2e2;
            color: #b91c1c;
            padding: 10px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .footer-links {
            margin-top: 30px;
            font-size: 14px;
            opacity: 0.7;
        }

        .footer-links a {
            color: var(--color-texto);
            font-weight: bold;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">okupo</div>
        <h2>Tu experto de confianza</h2>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form action="/login" method="POST">
            <div class="input-group">
                <label>Correo Electrónico</label>
                <input type="email" name="email" placeholder="ejemplo@correo.com" required>
            </div>

            <div class="input-group">
                <label>Contrasenna</label>
                <input type="password" name="contrasenna" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login">Ingresar</button>
        </form>

        <div class="footer-links">
            ¿No tienes cuenta? <a href="/registro">Regístrate aquí</a>
        </div>
    </div>

</body>
</html>
