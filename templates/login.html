<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Okupo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #1c150f; color: #edeae3; font-family: 'Inter', sans-serif; }
        .bg-card { background-color: #2a221b; border: 1px solid #9E8B71; }
        .text-accent { color: #C69B6F; }
        .bg-accent { background-color: #C69B6F; color: #1c150f; }
        .input-field { background-color: #3d342c; border: 1px solid #9E8B71; color: #edeae3; }
        .input-field:focus { border-color: #C69B6F; outline: none; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

<header class="p-6">
    <a href="/" class="text-4xl font-bold tracking-tighter text-center block">
        <span class="text-accent">o</span>kupo
    </a>
</header>

<div class="flex-1 flex items-center justify-center px-4">
    <div class="w-full max-w-md bg-card p-8 rounded-3xl shadow-2xl">
        
        <h2 class="text-3xl font-bold mb-6 text-center text-accent">Bienvenido</h2>

        {% if error %}
        <div class="bg-red-900 border border-red-600 text-white px-4 py-2 rounded-lg mb-6 text-sm text-center">
            {{ error }}
        </div>
        {% endif %}

        <form action="/login" method="POST">
            <div class="mb-4">
                <label class="block text-sm font-medium mb-1 opacity-70">Correo Electrónico</label>
                <input type="email" name="email" required 
                    class="w-full px-4 py-3 rounded-xl input-field">
            </div>

            <div class="mb-8">
                <label class="block text-sm font-medium mb-1 opacity-70">Contraseña</label>
                <input type="password" name="contrasenna" required 
                    class="w-full px-4 py-3 rounded-xl input-field">
            </div>

            <button type="submit" class="w-full bg-accent font-bold py-4 rounded-xl text-lg hover:opacity-90 transition">
                Ingresar
            </button>
        </form>

        <p class="text-center text-sm mt-8 opacity-70">
            ¿No tienes cuenta? <a href="/registro" class="text-accent font-bold">Regístrate</a>
        </p>
    </div>
</div>

</body>
</html>
