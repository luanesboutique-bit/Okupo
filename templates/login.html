<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenido - Okupo</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --color-crema: #fdfaf5;
            --color-texto: #5a3e2b;
            --color-google: #ea4335;
            --color-facebook: #1877f2;
        }

        body {
            background-color: var(--color-crema);
            background-image: url('https://www.transparenttextures.com/patterns/cream-paper.png');
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--color-texto);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .welcome-container {
            width: 100%;
            max-width: 420px;
            padding: 40px 30px;
            text-align: center;
        }

        .logo-main {
            font-size: 60px;
            font-weight: 900;
            letter-spacing: -2px;
            margin-bottom: 5px;
            color: var(--color-texto);
        }

        .slogan {
            font-size: 16px;
            opacity: 0.6;
            margin-bottom: 50px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .social-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .btn-social {
            width: 100%;
            padding: 16px;
            border-radius: 15px;
            border: 1px solid rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            font-size: 16px;
            font-weight: 700;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
            background: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .btn-social:active { transform: scale(0.98); }

        .btn-google { color: var(--color-google); }
        .btn-facebook { color: var(--color-facebook); }
        .btn-email { 
            background-image: url('/static/madera_media.jpg'); 
            background-size: cover;
            color: var(--color-texto);
            border: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 30px 0;
            opacity: 0.4;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--color-texto);
        }

        .professional-link {
            margin-top: 40px;
            padding: 20px;
            border-radius: 20px;
            background: rgba(139, 90, 43, 0.05);
            border: 1px dashed rgba(139, 90, 43, 0.3);
        }

        .professional-link p {
            font-size: 14px;
            margin-bottom: 10px;
            opacity: 0.8;
        }

        .professional-link a {
            color: var(--color-texto);
            font-weight: 800;
            text-decoration: underline;
            font-size: 15px;
        }

        /* Modal simple para Login de Correo (Simulado para diseño) */
        .login-form {
            display: none; /* Se activaría con JS */
            text-align: left;
            margin-top: 20px;
        }
        .login-form.active { display: block; }
        
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }

    </style>
</head>
<body>

    <div class="welcome-container">
        <div class="logo-main">okupo</div>
        <div class="slogan">Tu experto a un clic</div>

        {% if error %}
            <div style="background: #fee2e2; color: #b91c1c; padding: 10px; border-radius: 10px; margin-bottom: 20px; font-size: 14px;">
                {{ error }}
            </div>
        {% endif %}

        <div id="social-view">
            <div class="social-buttons">
                <a href="#" class="btn-social btn-google">
                    <i class="fab fa-google"></i> Entrar con Google
                </a>
                <a href="#" class="btn-social btn-facebook">
                    <i class="fab fa-facebook-f"></i> Entrar con Facebook
                </a>
                <a href="javascript:void(0)" onclick="showEmailLogin()" class="btn-social btn-email">
                    <i class="fas fa-envelope"></i> Entrar con Correo / Teléfono
                </a>
            </div>
        </div>

        <div id="email-view" class="login-form">
            <form action="/login" method="POST">
                <div class="input-group">
                    <label>Correo o Teléfono</label>
                    <input type="email" name="email" placeholder="ejemplo@correo.com" required>
                </div>
                <div class="input-group">
                    <label>Contraseña</label>
                    <input type="password" name="contrasenna" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-social btn-email" style="cursor: pointer;">Ingresar</button>
                <a href="javascript:void(0)" onclick="hideEmailLogin()" style="display: block; margin-top: 15px; font-size: 13px; opacity: 0.6; color: var(--color-texto);">
                    <i class="fas fa-arrow-left"></i> Volver a opciones sociales
                </a>
            </form>
        </div>

        <div class="professional-link">
            <p>¿Eres un profesional del hogar?</p>
            <a href="/registro?rol=colaborador">Regístrate como Técnico Aquí</a>
        </div>
        
        <p style="margin-top: 30px; font-size: 13px; opacity: 0.5;">
            ¿No tienes cuenta? <a href="/registro" style="color: var(--color-texto); font-weight: 700;">Regístrate como cliente</a>
        </p>
    </div>

    <script>
        function showEmailLogin() {
            document.getElementById('social-view').style.display = 'none';
            document.getElementById('email-view').classList.add('active');
        }
        function hideEmailLogin() {
            document.getElementById('social-view').style.display = 'block';
            document.getElementById('email-view').classList.remove('active');
        }
    </script>
</body>
</html>
