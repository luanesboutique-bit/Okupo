<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Okupo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9fafb;
        }
        .btn-ingresar {
            background-color: #f97316;
        }
        .btn-ingresar:hover {
            background-color: #ea580c;
        }
    </style>
</head>
<body>

<div class="min-h-screen flex flex-col items-center justify-center py-8 px-4 max-w-md mx-auto">

    <!-- LOGO -->
    <div class="mb-8 text-center">
        <h1 class="text-6xl font-bold">
          <span class="text-orange-500">o</span>
<span class="text-blue-600">k</span>
<span class="text-orange-500">u</span>
<span class="text-blue-600">p</span>
<span class="text-orange-500">o</span>
        </h1>
        <p class="text-gray-500 mt-2">¡Bienvenido de nuevo!</p>
    </div>

    <!-- FORMULARIO -->
    <form action="/login" method="POST" class="w-full bg-white p-8 rounded-2xl shadow-lg">
        
        <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Iniciar Sesión</h2>

        <!-- EMAIL -->
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">Correo Electrónico</label>
            <input type="email" name="email" required 
                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        </div>

        <!-- PASSWORD -->
        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
            <input type="password" name="contrasena" required 
                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        </div>

        <!-- BOTÓN -->
        <button type="submit" class="btn-ingresar w-full text-white font-bold py-3 rounded-lg text-lg">
            Ingresar
        </button>

        <!-- LINK A REGISTRO -->
        <p class="text-center text-sm text-gray-600 mt-6">
            ¿No tienes cuenta? <a href="/registro" class="text-blue-600 font-bold">Regístrate aquí</a>
        </p>
        <!-- LINK OLVIDASTE CONTRASEÑA -->
<p class="text-center text-sm text-gray-600 mt-4">
    <a href="/recuperar" class="text-blue-600 hover:underline">¿Olvidaste tu contraseña?</a>
</p>

    </form>

</div>

</body>
</html>
