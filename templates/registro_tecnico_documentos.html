<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Técnico - Documentación - Okupo</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --color-crema: #fdfaf5;
            --color-texto: #5a3e2b;
            --color-dorado: #d4af37;
        }

        /* 🛠️ FUERZA EL FONDO Y ELIMINA NEGRO */
        html, body {
            background-color: var(--color-crema) !important;
            margin: 0; padding: 0; width: 100%; height: 100%;
        }

        body {
            background-image: url('/static/fondo_pared.jpg') !important;
            background-size: cover !important;
            background-attachment: fixed !important;
            background-position: center !important;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--color-texto);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .registro-container {
            width: 90%;
            max-width: 450px;
            background: var(--color-crema) !important;
            background-image: url('https://www.transparenttextures.com/patterns/cream-paper.png') !important;
            border-radius: 30px;
            padding: 40px 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            border: 2px solid rgba(139, 90, 43, 0.3);
            position: relative;
            margin: 20px;
        }

        .step-indicator {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            background-image: url('/static/madera_media.jpg');
            background-size: cover;
            color: var(--color-texto);
            padding: 8px 25px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 14px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            text-transform: uppercase;
        }

        h2 { font-size: 24px; font-weight: 900; margin-bottom: 10px; text-align: center; color: var(--color-texto) !important; }
        p.sub-guia { text-align: center; font-size: 14px; opacity: 0.7; margin-bottom: 30px; line-height: 1.4; color: var(--color-texto) !important; }

        .upload-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .upload-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .upload-item label {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            opacity: 0.8;
            text-align: center;
            color: var(--color-texto);
        }

        .drop-zone {
            aspect-ratio: 1.2;
            border: 2px dashed #d4c5b3;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(255,255,255,0.5);
            padding: 10px;
            text-align: center;
        }

        .drop-zone:hover { border-color: var(--color-dorado); background: white; }
        .drop-zone i { font-size: 24px; color: var(--color-dorado); margin-bottom: 5px; opacity: 0.6; }
        .drop-zone span { font-size: 10px; font-weight: 700; opacity: 0.7; color: var(--color-texto); }

        .btn-continuar {
            width: 100%;
            padding: 18px;
            background-image: url('/static/madera_media.jpg');
            background-size: cover;
            border: 2px solid rgba(0,0,0,0.1);
            border-radius: 15px;
            color: var(--color-texto);
            font-size: 18px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            text-transform: uppercase;
        }

        .btn-retroceder {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: var(--color-texto);
            opacity: 0.6;
            text-decoration: none;
            font-weight: 700;
        }

    </style>
</head>
<body>

    <div class="registro-container">
        <div class="step-indicator">Paso 2 de 5</div>
        
        <h2>Documentación</h2>
        <p class="sub-guia">Sube fotos claras para validar tu cuenta profesional.</p>

        <form action="{{ url_for('colaboradores.registro_tecnico_categorias') }}" method="POST">
            <div class="upload-grid">
                <div class="upload-item">
                    <label>Identificación (Frente)</label>
                    <div class="drop-zone" onclick="document.getElementById('identificacion_frontal').click()">
                        <i class="fas fa-id-card"></i>
                        <span>Subir Foto</span>
                        <input type="file" id="identificacion_frontal" name="identificacion_frontal" style="display:none" accept="image/*">
                    </div>
                </div>

                <div class="upload-item">
                    <label>Identificación (Atrás)</label>
                    <div class="drop-zone" onclick="document.getElementById('identificacion_trasera').click()">
                        <i class="fas fa-id-card"></i>
                        <span>Subir Foto</span>
                        <input type="file" id="identificacion_trasera" name="identificacion_trasera" style="display:none" accept="image/*">
                    </div>
                </div>

                <div class="upload-item">
                    <label>Comprobante</label>
                    <div class="drop-zone" onclick="document.getElementById('comprobante_domicilio').click()">
                        <i class="fas fa-home"></i>
                        <span>Subir Foto</span>
                        <input type="file" id="comprobante_domicilio" name="comprobante_domicilio" style="display:none" accept="image/*">
                    </div>
                </div>

                <div class="upload-item">
                    <label>Selfie con ID</label>
                    <div class="drop-zone" onclick="document.getElementById('foto_perfil_identificacion').click()">
                        <i class="fas fa-camera"></i>
                        <span>Tomar Foto</span>
                        <input type="file" id="foto_perfil_identificacion" name="foto_perfil_identificacion" style="display:none" accept="image/*">
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-continuar">Validar y Continuar</button>
            <a href="javascript:history.back()" class="btn-retroceder">
                <i class="fas fa-arrow-left"></i> Volver al paso anterior
            </a>
        </form>
    </div>

</body>
</html>
