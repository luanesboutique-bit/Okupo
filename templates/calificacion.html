<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calificar Servicio - Okupo</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --color-crema: #fdfaf5;
            --color-texto: #5a3e2b;
            --color-dorado: #d4af37;
            --color-estrella: #f1c40f;
            --color-rojo: #e74c3c;
        }

        /* 🛠️ ESTILO UNIFICADO "OKUPO" */
        html, body {
            background-color: var(--color-crema) !important;
            margin: 0; padding: 0; width: 100%; height: 100%;
        }

        body {
            background-image: url('/static/fondo_pared.jpg') !important;
            background-size: cover !important;
            background-attachment: fixed !important;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--color-texto);
            display: flex;
            justify-content: center;
        }

        /* MODO URGENCIA ACTIVO */
        .modo-urgencia-activo, .modo-urgencia-activo html, .modo-urgencia-activo body {
            background-color: #ff8c00 !important;
            background-image: none !important;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            min-height: 100vh;
            background: transparent !important;
            position: relative;
            padding: 40px 20px;
            box-sizing: border-box;
            text-align: center;
        }

        .banner-urgencia {
            display: none;
            background: #ff0000;
            color: #ffffff;
            padding: 8px 10px;
            text-align: center;
            font-weight: 900;
            font-size: 13px;
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 4000;
            text-transform: uppercase;
        }

        .modo-urgencia-activo .banner-urgencia { display: block; }

        .feedback-card {
            background: rgba(253, 250, 245, 0.95);
            background-image: url('https://www.transparenttextures.com/patterns/cream-paper.png');
            border-radius: 40px;
            padding: 35px 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            border: 2px solid var(--color-dorado);
            position: relative;
        }

        .avatar-tecnico {
            width: 90px;
            height: 90px;
            background-image: url('/static/piedra_boton.png');
            background-size: cover;
            border-radius: 50%;
            margin: -80px auto 20px auto;
            border: 4px solid var(--color-dorado);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 45px;
            color: var(--color-dorado);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        h2 { font-size: 24px; font-weight: 900; margin-bottom: 10px; }
        p.subtitulo { font-size: 14px; opacity: 0.7; margin-bottom: 30px; line-height: 1.4; }

        .stars-container { display: flex; justify-content: center; gap: 10px; margin-bottom: 35px; }
        .star-btn { font-size: 35px; color: #ddd; cursor: pointer; transition: transform 0.2s, color 0.2s; }
        .star-btn.active { color: var(--color-estrella); text-shadow: 0 0 10px rgba(241, 196, 15, 0.4); transform: scale(1.2); }

        .aspectos-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .aspecto-item { display: flex; flex-direction: column; align-items: center; gap: 8px; font-size: 10px; font-weight: 800; text-transform: uppercase; opacity: 0.6; cursor: pointer; padding: 10px; border-radius: 15px; border: 1px solid transparent; transition: all 0.2s; }
        .aspecto-item i { font-size: 20px; color: var(--color-texto); }
        .aspecto-item.selected { background: white; border-color: var(--color-dorado); opacity: 1; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        /* CONTROL DE CONFIANZA */
        .control-confianza { text-align: left; margin-top: 25px; border-top: 1px solid #eee; padding-top: 20px; }
        .control-titulo { font-size: 13px; font-weight: 900; text-transform: uppercase; color: var(--color-dorado); margin-bottom: 15px; display: block; }
        .pregunta-item { margin-bottom: 20px; }
        .pregunta-item label { font-size: 13px; font-weight: 700; display: block; margin-bottom: 10px; line-height: 1.3; }
        .opciones-si-no { display: flex; gap: 10px; }
        .btn-opcion { flex: 1; padding: 10px; border-radius: 12px; border: 1px solid #ddd; background: white; font-size: 11px; font-weight: 800; cursor: pointer; transition: all 0.2s; color: var(--color-texto); }
        .btn-opcion.selected { background: var(--color-texto); color: white; border-color: var(--color-texto); }
        .btn-opcion.alerta.selected { background: var(--color-rojo); border-color: var(--color-rojo); }

        .comment-box { width: 100%; padding: 15px; border-radius: 20px; border: 1px solid #ddd; background: #fff; font-family: inherit; font-size: 14px; box-sizing: border-box; margin: 20px 0; outline: none; resize: none; }
        .btn-enviar { width: 100%; padding: 20px; background-image: url('/static/madera_oscura.jpg'); background-size: cover; border: none; border-radius: 20px; color: #ffff00; text-shadow: 1px 1px 2px black; font-size: 18px; font-weight: 900; cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.3); text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="banner-urgencia" id="banner-urgencia">⚠️ ATENCIÓN INMEDIATA ACTIVADA - PRIORIDAD MÁXIMA</div>
    <div class="app-container">
        <div style="height: 60px;"></div>
        <form action="{{ url_for('principal.index') }}" class="feedback-card">
            <div class="avatar-tecnico"><i class="fas fa-user-check"></i></div>
            <h2>¡Trabajo Terminado!</h2>
            <p class="subtitulo">Tu opinión nos ayuda a mantener la seguridad en Okupo.</p>

            <div class="stars-container" id="stars">
                <i class="fas fa-star star-btn" data-value="1"></i>
                <i class="fas fa-star star-btn" data-value="2"></i>
                <i class="fas fa-star star-btn" data-value="3"></i>
                <i class="fas fa-star star-btn" data-value="4"></i>
                <i class="fas fa-star star-btn" data-value="5"></i>
            </div>

            <div class="aspectos-grid">
                <div class="aspecto-item" onclick="toggleAspecto(this)"><i class="fas fa-clock"></i><span>Puntualidad</span></div>
                <div class="aspecto-item" onclick="toggleAspecto(this)"><i class="fas fa-broom"></i><span>Limpieza</span></div>
                <div class="aspecto-item" onclick="toggleAspecto(this)"><i class="fas fa-shield-alt"></i><span>Calidad</span></div>
            </div>

            <div class="control-confianza">
                <span class="control-titulo">Encuesta de Cumplimiento</span>
                
                <div class="pregunta-item">
                    <label>¿El técnico te dio su teléfono o pidió tu WhatsApp?</label>
                    <div class="opciones-si-no">
                        <button type="button" class="btn-opcion alerta" onclick="seleccionarOpcion(this)">SÍ, pidió contacto</button>
                        <button type="button" class="btn-opcion" onclick="seleccionarOpcion(this)">NO, fue profesional</button>
                    </div>
                </div>

                <div class="pregunta-item">
                    <label>¿Te entregó una tarjeta de presentación física?</label>
                    <div class="opciones-si-no">
                        <button type="button" class="btn-opcion alerta" onclick="seleccionarOpcion(this)">SÍ entregó</button>
                        <button type="button" class="btn-opcion" onclick="seleccionarOpcion(this)">NO entregó</button>
                    </div>
                </div>

                <div class="pregunta-item">
                    <label>¿Sugirió cobrar el servicio por fuera de la app?</label>
                    <div class="opciones-si-no">
                        <button type="button" class="btn-opcion alerta" onclick="seleccionarOpcion(this)">SÍ sugirió</button>
                        <button type="button" class="btn-opcion" onclick="seleccionarOpcion(this)">NO sugirió</button>
                    </div>
                </div>
            </div>

            <textarea class="comment-box" rows="3" placeholder="Comentarios adicionales..."></textarea>
            <button type="submit" class="btn-enviar">Finalizar</button>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('okupo_urgencia_247') === 'true') document.body.classList.add('modo-urgencia-activo');
        });

        const stars = document.querySelectorAll('.star-btn');
        stars.forEach(star => {
            star.addEventListener('click', () => {
                const val = star.getAttribute('data-value');
                stars.forEach(s => s.classList.toggle('active', s.getAttribute('data-value') <= val));
            });
        });

        function toggleAspecto(el) { el.classList.toggle('selected'); }

        function seleccionarOpcion(btn) {
            const row = btn.parentElement;
            row.querySelectorAll('.btn-opcion').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }
    </script>
</body>
</html>
