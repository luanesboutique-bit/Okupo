<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servicios - Okupo</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --color-crema: #fdfaf5;
            --color-texto: #5a3e2b;
            --color-dorado: #d4af37;
        }

        body {
            background-color: var(--color-crema);
            background-image: url('https://www.transparenttextures.com/patterns/cream-paper.png');
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--color-texto);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            min-height: 100vh;
            background: var(--color-crema);
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            padding-bottom: 30px;
        }

        .header {
            padding: 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(139, 90, 43, 0.1);
        }
        .header a { color: var(--color-texto); font-size: 22px; margin-right: 20px; }
        .header h1 { font-size: 20px; margin: 0; font-weight: 700; }

        .list-container {
            padding: 20px;
        }

        .card-subcat {
            background-image: url('/static/madera_clara.jpg');
            background-size: cover;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            display: block;
            text-decoration: none;
            color: var(--color-texto);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border: 1px solid rgba(139, 90, 43, 0.2);
            transition: transform 0.2s;
        }
        .card-subcat:active { transform: scale(0.98); }

        .card-subcat h3 {
            margin: 0 0 8px 0;
            font-size: 20px;
            font-weight: 800;
        }

        .card-subcat p {
            margin: 0;
            font-size: 14px;
            opacity: 0.8;
            line-height: 1.4;
        }

        .btn-ver {
            margin-top: 15px;
            display: inline-block;
            background: rgba(139, 90, 43, 0.8);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <a href="{{ url_for('principal.index') }}"><i class="fas fa-arrow-left"></i></a>
            <h1>¿Qué necesitas hoy?</h1>
        </div>

        <div class="list-container">
            {% for sub in subcategorias %}
            <a href="{{ url_for('principal.marketplace', subcategoria_id=sub.id) }}" class="card-subcat">
                <h3>{{ sub.nombre }}</h3>
                <p>{{ sub.descripcion or 'Contamos con expertos certificados listos para ayudarte con este servicio de inmediato.' }}</p>
                <div class="btn-ver">Ver Disponibles</div>
            </a>
            {% else %}
            <div style="text-align: center; margin-top: 50px; opacity: 0.5;">
                <i class="fas fa-search" style="font-size: 40px; margin-bottom: 15px; display: block;"></i>
                No hay servicios disponibles en esta categoría por ahora.
            </div>
            {% endfor %}
        </div>
    </div>

</body>
</html>
