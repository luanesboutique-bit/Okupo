<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Técnico - Horarios</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-image: url('/static/fondo_pared.jpg'); background-size: cover; font-family: 'Georgia', serif; color: #5a3e2b; padding: 20px; }
        .contenedor { max-width: 600px; margin: auto; background-image: url('/static/madera_clara.jpg'); padding: 30px; border-radius: 20px; border: 3px solid #b89a7b; }
        .paso { font-size: 14px; font-weight: bold; color: #8b5a2b; margin-bottom: 10px; }
        .grid-dias { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 30px; }
        .dia { background: rgba(255,255,255,0.5); padding: 10px; border-radius: 10px; text-align: center; border: 1px solid #d4b89a; }
        .dia input[type="checkbox"] { margin-bottom: 10px; }
        input[type="time"] { width: 100%; border-radius: 5px; border: 1px solid #d4b89a; }
        .boton { background-image: url('/static/madera_media.jpg'); color: #5a3e2b; width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 18px; margin-top: 20px; border: 2px solid #8b5a2b; }
    </style>
</head>
<body>
    <div class="contenedor">
        <div class="paso">PASO 3 DE 3</div>
        <h2>Horario Semanal</h2>
        <p>Selecciona los días y horas en los que estarás disponible para recibir trabajos.</p>
        
        <form action="{{ url_for('colaboradores.registro_tecnico_horarios') }}" method="POST">
            <div class="grid-dias">
                {% for i in range(1, 7) %}
                <div class="dia">
                    <label>{{ ["Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado"][i-1] }}</label><br>
                    <input type="checkbox" name="dia_{{i}}_activo" checked> Activo<br>
                    <input type="time" name="dia_{{i}}_inicio" value="08:00"><br>
                    <input type="time" name="dia_{{i}}_fin" value="18:00">
                </div>
                {% endfor %}
                <div class="dia">
                    <label>Domingo</label><br>
                    <input type="checkbox" name="dia_0_activo"> Activo<br>
                    <input type="time" name="dia_0_inicio" value="09:00"><br>
                    <input type="time" name="dia_0_fin" value="14:00">
                </div>
            </div>
            
            <button type="submit" class="boton">FINALIZAR REGISTRO <i class="fas fa-check-circle"></i></button>
        </form>
    </div>
</body>
</html>
