<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedir Servicio - Okupo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f8f5f0;
        }
    </style>
</head>
<body class="font-sans">

<!-- BARRA DE NAVEGACIÓN -->
<header class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-4xl mx-auto px-4 py-3 flex justify-between items-center">
        <a href="{{ url_for('index') }}" class="text-2xl text-gray-700">
            <i class="fas fa-arrow-left"></i>
        </a>
        <div class="text-3xl font-bold">
            <span class="text-red-600">o</span><span class="text-blue-600">kupo</span>
        </div>
        <a href="{{ url_for('login') }}" class="text-3xl text-gray-700">
            <i class="fas fa-user-circle"></i>
        </a>
    </div>
</header>

<main class="max-w-4xl mx-auto px-4 py-6">

    <h2 class="text-3xl font-bold text-gray-800 mb-6 text-center">Solicita tu Servicio</h2>

    <form method="POST" class="bg-white rounded-xl shadow-lg p-6 max-w-2xl mx-auto">
        
        <!-- Descripción -->
        <div class="mb-4">
            <label class="block text-gray-700 font-bold mb-2">¿Qué necesitas?</label>
            <textarea name="descripcion" rows="4" required
                      class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                      placeholder="Describe detalladamente el problema..."></textarea>
        </div>

        <!-- Urgencia -->
        <div class="mb-4">
            <label class="block text-gray-700 font-bold mb-2">Nivel de Urgencia</label>
            <select name="urgencia" class="w-full px-4 py-2 border rounded-lg focus:outline-none">
                <option value="baja">Baja</option>
                <option value="media" selected>Media</option>
                <option value="alta">Alta</option>
            </select>
        </div>

        <!-- 🆕 SUBIR FOTO -->
        <div class="mb-4">
            <label class="block text-gray-700 font-bold mb-2">Evidencia Fotográfica</label>
            <input type="file" name="foto" accept="image/*"
                   class="w-full px-4 py-2 border rounded-lg focus:outline-none">
        </div>

        <!-- Campos ocultos para pasar los ID -->
        <input type="hidden" name="subcategoria_id" value="{{ request.args.get('subcategoria_id', 1) }}">
        <input type="hidden" name="latitud" value="19.4326">
        <input type="hidden" name="longitud" value="-99.1332">

        <!-- Botón Enviar -->
        <button type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-full transition">
            ✅ Solicitar Servicio
        </button>

    </form>

</main>

</body>
</html>
