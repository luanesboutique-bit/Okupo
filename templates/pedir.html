<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitar - Okupo</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --color-crema: #fdfaf5;
            --color-texto: #5a3e2b;
            --color-dorado: #d4af37;
        }

        body {
            background-color: var(--color-crema);
            background-image: url('https://www.transparenttextures.com/patterns/cream-paper.png');
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--color-texto);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            min-height: 100vh;
            background: var(--color-crema);
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            padding-bottom: 30px;
        }

        .header {
            padding: 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(139, 90, 43, 0.1);
        }
        .header a { color: var(--color-texto); font-size: 22px; margin-right: 20px; }
        .header h1 { font-size: 20px; margin: 0; font-weight: 700; }

        .form-container {
            padding: 20px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--color-texto);
        }

        .input-group textarea, .input-group select {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            border: 1px solid #ddd;
            background: white;
            box-sizing: border-box;
            font-size: 15px;
            font-family: inherit;
        }

        .input-group textarea:focus {
            border-color: var(--color-texto);
            outline: none;
        }

        .photo-upload {
            border: 2px dashed #ddd;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .photo-upload:hover { border-color: var(--color-dorado); }
        .photo-upload i { font-size: 40px; color: var(--color-dorado); margin-bottom: 10px; opacity: 0.5; }
        .photo-upload p { font-size: 12px; margin: 0; opacity: 0.6; }

        .btn-enviar {
            width: 100%;
            padding: 20px;
            background-image: url('/static/madera_media.jpg');
            background-size: cover;
            border: none;
            border-radius: 20px;
            color: var(--color-texto);
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <a href="javascript:history.back()"><i class="fas fa-arrow-left"></i></a>
            <h1>Detalles del Pedido</h1>
        </div>

        <div class="form-container">
            <form method="POST">
                <div class="input-group">
                    <label>Describe lo que necesitas</label>
                    <textarea name="descripcion" rows="4" placeholder="Ej: Mi llave se rompió dentro de la cerradura y no puedo entrar..." required></textarea>
                </div>

                <div class="input-group">
                    <label>¿Qué tan urgente es?</label>
                    <select name="urgencia">
                        <option value="baja">Baja (Puede esperar)</option>
                        <option value="media" selected>Media (Normal)</option>
                        <option value="alta">Alta (Urgente)</option>
                        <option value="critica">Crítica (¡Ahora mismo!)</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Evidencia (Opcional)</label>
                    <div class="photo-upload">
                        <i class="fas fa-camera"></i>
                        <p>Toca para subir una foto del problema</p>
                    </div>
                </div>

                <!-- Campos ocultos actualizados con localStorage -->
                <input type="hidden" name="subcategoria_id" value="{{ subcat_id }}">
                <input type="hidden" name="colaborador_id" value="{{ colaborador_id }}">
                <input type="hidden" name="latitud" id="lat-input">
                <input type="hidden" name="longitud" id="lon-input">

                <button type="submit" class="btn-enviar">Solicitar Servicio</button>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('lat-input').value = localStorage.getItem('okupo_lat') || '19.4326';
            document.getElementById('lon-input').value = localStorage.getItem('okupo_lon') || '-99.1332';
        });
    </script>
</body>
</html>
