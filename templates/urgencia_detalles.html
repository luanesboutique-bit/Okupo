<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles de Urgencia - Okupo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --color-urgencia: #ffff00;
            --color-texto: #fdfaf5;
        }
        body {
            background-image: url('/static/fondo_pared.jpg');
            background-size: cover;
            background-attachment: fixed;
            font-family: 'Segoe UI', sans-serif;
            margin: 0; display: flex; justify-content: center;
            color: var(--color-texto);
        }
        .app-container {
            width: 100%; max-width: 450px; min-height: 100vh;
            background: rgba(0,0,0,0.85); padding: 25px; box-sizing: border-box;
        }
        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; }
        .header h1 { font-size: 22px; color: var(--color-urgencia); margin: 0; font-weight: 900; }

        .form-urgencia { display: flex; flex-direction: column; gap: 20px; }

        label { font-weight: 800; text-transform: uppercase; font-size: 14px; color: var(--color-urgencia); }

        textarea {
            width: 100%; background: #222; border: 2px solid #444; border-radius: 15px;
            padding: 15px; color: white; font-size: 16px; box-sizing: border-box;
            font-family: inherit; resize: none;
        }
        textarea:focus { border-color: var(--color-urgencia); outline: none; }

        .btn-foto {
            background: #333; border: 2px dashed var(--color-urgencia);
            padding: 20px; border-radius: 15px; color: var(--color-urgencia);
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            cursor: pointer; font-weight: 700;
        }

        .btn-enviar {
            background: var(--color-urgencia); color: #000;
            padding: 20px; border-radius: 30px; border: none;
            font-size: 18px; font-weight: 900; text-transform: uppercase;
            cursor: pointer; margin-top: 20px;
            box-shadow: 0 0 15px rgba(255, 255, 0, 0.3);
        }
        .btn-enviar:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <a href="javascript:history.back()" style="color: var(--color-urgencia);"><i class="fas fa-chevron-left"></i></a>
            <h1>DETALLES DEL PROBLEMA</h1>
        </div>

        <form action="/urgencia/buscando" class="form-urgencia">
            <div class="campo">
                <label>Describe brevemente la urgencia:</label>
                <textarea rows="4" placeholder="Ej: La llave del banno no cierra y se está inundando..."></textarea>
            </div>

            <div class="campo">
                <label>Evidencia (Opcional):</label>
                <div class="btn-foto">
                    <i class="fas fa-camera fa-2x"></i>
                    <span>Tomar Foto / Subir Imagen</span>
                </div>
            </div>

            <button type="submit" class="btn-enviar">Solicitar Ayuda Ahora</button>
        </form>
    </div>
</body>
</html>
