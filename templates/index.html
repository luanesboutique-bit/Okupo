<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Okupo - Servicios</title>
    
    <!-- ICONOS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ESTILO GENERAL */
        body {
            background-image: url('/static/fondo_pared.jpg');
            background-size: cover;
            background-attachment: fixed;
            font-family: 'Georgia', serif;
            color: #5a3e2b;
            margin: 0;
            padding: 20px;
            /* 📏 LÍMITE DE ANCHO MÁXIMO */
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }

        /* TITULO Y MENU */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .header i { 
            font-size: clamp(24px, 5vw, 30px); 
        }
        .titulo {
            font-size: clamp(32px, 6vw, 40px);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        /* BARRA DE BUSQUEDA */
        .buscador {
            background: rgba(255,255,255,0.7);
            border-radius: 30px;
            padding: 15px;
            display: flex;
            align-items: center;
            margin-bottom: 30px;
            border: 1px solid #d4b89a;
            font-size: clamp(16px, 3vw, 18px);
        }
        .buscador i { margin-right: 10px; }

        /* UBICACION */
        .ubicacion {
            font-size: clamp(16px, 3vw, 18px);
            margin-bottom: 30px;
            display: flex;
            align-items: center;
        }
        .ubicacion i { margin-right: 10px; color: #8b5a2b; }

        /* SECCION SERVICIOS EXPRESS */
        h2 {
            font-size: clamp(24px, 5vw, 28px);
            margin-bottom: 25px;
        }

        /* CONTENEDOR DE BOTONES GRANDES (PIEDRA) */
        .grid-piedras {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }

        .boton-piedra {
            background-image: url('/static/marco_piedras.jpg');
            background-size: cover;
            background-position: center;
            border-radius: 20px;
            height: clamp(180px, 35vw, 220px);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border: none;
            cursor: pointer;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .boton-piedra .piedra-centro {
            width: 90%;
            height: 85%;
            background-image: url('/static/piedra_boton.png');
            background-size: cover;
            background-position: center;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* ✨ EFECTO METALICO DORADO */
            color: #d4af37;
            text-shadow: 
                0 1px 0 #b8860b,
                0 2px 0 #b8860b,
                0 3px 0 #b8860b,
                0 4px 0 #b8860b,
                0 5px 10px rgba(0,0,0,0.6),
                0 0 20px rgba(255,215,0,0.5);
            font-size: clamp(18px, 4vw, 22px);
            font-weight: bold;
        }

        .boton-piedra i {
            font-size: clamp(40px, 10vw, 60px);
            margin-bottom: 10px;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.8));
        }

        /* CONTENEDOR DE BOTONES PEQUEÑOS (MADERA) */
        .grid-maderas {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 15px;
        }

        .boton-madera {
            background-size: cover;
            background-position: center;
            border-radius: 20px;
            padding: 15px;
            color: #5a3e2b;
            font-size: clamp(14px, 3vw, 16px);
            border: 2px solid #b89a7b;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        /* COLORES DE MADERA */
        .clara { background-image: url('/static/madera_clara.jpg'); }
        .media { background-image: url('/static/madera_media.jpg'); }
        .oscura { 
            background-image: url('/static/madera_oscura.jpg'); 
            color: white; 
            text-shadow: 1px 1px 2px black; 
        }

        /* 📱 RESPONSIVO PARA CELULAR */
        @media (max-width: 600px) {
            .grid-piedras {
                grid-template-columns: 1fr;
            }
            .grid-maderas {
                grid-template-columns: 1fr 1fr;
            }
        }

    </style>
</head>
<body>

    <!-- MENU, TITULO Y USUARIO -->
    <div class="header">
        <a href="{{ url_for('mis_pedidos') }}" style="color: inherit; text-decoration: none;">
            <i class="fas fa-bars"></i>
        </a>
        <div class="titulo">okupo</div>
        <a href="{{ url_for('login') }}" style="color: inherit; text-decoration: none;">
            <i class="fas fa-user-circle"></i>
        </a>
    </div>

    <!-- BUSCADOR -->
    <div class="buscador">
        <i class="fas fa-search"></i>
        <span>Buscar</span>
    </div>

    <!-- UBICACION -->
    <div class="ubicacion">
        <i class="fas fa-map-marker-alt"></i>
        <span>Zapopan, Jalisco</span>
        <i class="fas fa-chevron-down" style="margin-left: 10px;"></i>
    </div>

    <!-- SERVICIOS EXPRESS -->
    <h2>Servicios Express</h2>

    <div class="grid-piedras">
        <a href="{{ url_for('marketplace', subcategoria_id=1) }}" class="boton-piedra" style="text-decoration: none;">
            <div class="piedra-centro">
                <i class="fas fa-key"></i>
                Cerrajería
            </div>
        </a>

        <a href="{{ url_for('marketplace', subcategoria_id=2) }}" class="boton-piedra" style="text-decoration: none;">
            <div class="piedra-centro">
                <i class="fas fa-faucet"></i>
                Plomería
            </div>
        </a>

        <a href="{{ url_for('marketplace', subcategoria_id=3) }}" class="boton-piedra" style="text-decoration: none;">
            <div class="piedra-centro">
                <i class="fas fa-bolt"></i>
                Electricidad
            </div>
        </a>

        <a href="{{ url_for('marketplace', subcategoria_id=4) }}" class="boton-piedra" style="text-decoration: none;">
            <div class="piedra-centro">
                <i class="fas fa-spray-can"></i>
                Limpieza
            </div>
        </a>
    </div>

    <!-- BOTONES DE MADERA - ORDEN CORRECTO -->
    <div class="grid-maderas">
        <a href="{{ url_for('marketplace', subcategoria_id=5) }}" class="boton-madera clara" style="text-decoration: none;">Limpieza de Muebles</a>
        <a href="{{ url_for('marketplace', subcategoria_id=6) }}" class="boton-madera media" style="text-decoration: none;">Armado de Muebles</a>
        <a href="{{ url_for('marketplace', subcategoria_id=7) }}" class="boton-madera clara" style="text-decoration: none;">Instalaciones</a>
    </div>

    <div class="grid-maderas">
        <a href="{{ url_for('marketplace', subcategoria_id=8) }}" class="boton-madera clara" style="text-decoration: none;">Fletes y Mudanzas</a>
        <a href="{{ url_for('marketplace', subcategoria_id=9) }}" class="boton-madera media" style="text-decoration: none;">Albañilería y Pintura</a>
        <a href="{{ url_for('marketplace', subcategoria_id=10) }}" class="boton-madera oscura" style="text-decoration: none;">
            Urgencia 24/7 <i class="fas fa-bolt" style="margin-left:10px;"></i>
        </a>
    </div>

    <!-- 🚀 LAZY LOADING AUTOMATICO PARA QUE CARGUE RAPIDO -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const images = document.querySelectorAll('img');
            images.forEach(img => {
                img.loading = 'lazy';
            });
        });
    </script>

</body>
</html>
