<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Okupo - Servicios Express</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f8f5f0;
        }
    </style>
</head>
<body class="font-sans">

<!-- BARRA DE NAVEGACIÓN -->
<header class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-4xl mx-auto px-4 py-3 flex justify-between items-center">
        
        <!-- 👇 AQUÍ PON EL BOTÓN 👇 -->
        <button id="menuBtn" class="text-2xl text-gray-700">
            <i class="fas fa-bars"></i>
        </button>

        <div class="text-3xl font-bold">
            <span class="text-red-600">o</span><span class="text-blue-600">kupo</span>
        </div>
        <a href="{{ url_for('login') }}" class="text-3xl text-gray-700">
            <i class="fas fa-user-circle"></i>
        </a>
    </div>
</header>

<main class="max-w-4xl mx-auto px-4 py-6">

    <!-- BARRA DE BÚSQUEDA -->
    <div class="mt-4 relative">
        <input type="text" placeholder="Buscar" 
               class="w-full px-4 py-4 rounded-full border border-gray-300 focus:outline-none focus:ring-2 focus:link-blue">
        <button class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 text-xl">
            <i class="fas fa-search"></i>
        </button>
    </div>

    <!-- UBICACIÓN -->
    <div class="mt-4 flex items-center text-gray-600">
        <i class="fas fa-map-marker-alt mr-2"></i>
        <span id="ubicacionTexto">Obteniendo ubicación...</span>
        <i class="fas fa-chevron-down ml-2 text-sm"></i>
    </div>

    <!-- ============================================== -->
    <!--          CÓDIGO CON TODAS LAS CATEGORÍAS      -->
    <!-- ============================================== -->

    <h2 class="mt-8 text-3xl font-bold text-gray-800 mb-4">Categorías de Servicios</h2>

    <!-- PRIMEROS 4 GRANDES -->
<div class="grid grid-cols-2 gap-4 mb-8">

    <a href="{{ url_for('marketplace', subcategoria_id=1) }}" class="bg-blue-600 text-white">
        <div class="text-6xl mb-3"><i class="fas fa-key"></i></div>
        <h4 class="font-bold text-2xl">Cerrajería</h4>
    </a>

    <a href="{{ url_for('marketplace', subcategoria_id=2) }}" class="bg-orange-500 text-white">
        <div class="text-6xl mb-3"><i class="fas fa-faucet"></i></div>
        <h4 class="font-bold text-2xl">Plomería</h4>
    </a>

    <a href="{{ url_for('marketplace', subcategoria_id=3) }}" class="bg-green-500 text-white">
        <div class="text-6xl mb-3"><i class="fas fa-bolt"></i></div>
        <h4 class="font-bold text-2xl">Electricidad</h4>
    </a>

    <a href="{{ url_for('marketplace', subcategoria_id=4) }}" class="bg-teal-500 text-white">
        <div class="text-6xl mb-3"><i class="fas fa-broom"></i></div>
        <h4 class="font-bold text-2xl">Limpieza</h4>
    </a>

</div>

    <!-- SIGUIENTES 3 CHICOS -->
    <div class="grid grid-cols-3 gap-4 mb-8">

        <a href="/limpiezamuebles" class="bg-blue-500 text-white rounded-full py-3 px-2 text-center font-bold text-lg shadow-md">
            Limpieza de Muebles
        </a>

        <a href="/armadomuebles" class="bg-orange-400 text-white rounded-full py-3 px-2 text-center font-bold text-lg shadow-md">
            Armado de Muebles
        </a>

        <a href="/instalaciones" class="bg-gray-500 text-white rounded-full py-3 px-2 text-center font-bold text-lg shadow-md">
            Instalaciones
        </a>

    </div>

    <!-- ÚLTIMOS Y URGENCIA -->
    <div class="grid grid-cols-3 gap-4 items-center">

        <a href="/fletes" class="bg-orange-400 text-white rounded-full py-3 px-2 text-center font-bold text-lg shadow-md">
            Fletes y Mudanzas
        </a>

        <a href="/albanileria" class="bg-gray-500 text-white rounded-full py-3 px-2 text-center font-bold text-lg shadow-md">
            Albañilería y Pintura
        </a>

        <!-- URGENCIA -->
        <a href="/urgencia" class="bg-red-600 text-white border-2 border-red-400 rounded-full py-3 px-4 text-center font-bold text-lg shadow-md flex items-center justify-center gap-2">
            Urgencia 24/7 <i class="fas fa-bolt"></i>
        </a>

    </div>

</main>

<script>
    // Menú Hamburguesa
    const menuBtn = document.getElementById('menuBtn');

    menuBtn.addEventListener('click', function() {
        window.location.href = "{{ url_for('mis_pedidos') }}";
    });
    </script>

</body>
</html>
</body>
</html>
