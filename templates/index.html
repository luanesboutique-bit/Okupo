<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Okupo - Servicios</title>
    
    <!-- ICONOS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --color-crema: #fdfaf5;
            --color-texto: #5a3e2b;
            --color-dorado: #d4af37;
            --color-dorado-oscuro: #b8860b;
        }

        /* ESTILO GENERAL */
        body {
            background-color: var(--color-crema);
            background-image: url('https://www.transparenttextures.com/patterns/cream-paper.png'); /* Textura sutil */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--color-texto);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 450px; /* Tamaño móvil ideal */
            min-height: 100vh;
            background: var(--color-crema);
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            position: relative;
            padding-bottom: 30px;
        }

        /* DECORACIONES ELEGANTES */
        .decoracion-esquina {
            position: absolute;
            width: 100px;
            opacity: 0.15;
            pointer-events: none;
        }
        .top-left { top: 0; left: 0; transform: rotate(0deg); }
        .bottom-right { bottom: 0; right: 0; transform: rotate(180deg); }

        /* HEADER */
        .header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header i { font-size: 24px; color: var(--color-texto); cursor: pointer; }
        .logo { font-size: 32px; font-weight: bold; letter-spacing: 2px; }

        /* BUSCADOR */
        .search-box {
            margin: 0 20px 15px 20px;
            background: rgba(255,255,255,0.9);
            border: 1px solid #e0d5c5;
            border-radius: 25px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .search-box i { color: #a09080; margin-right: 10px; }
        .search-box span { color: #a09080; font-size: 16px; }

        /* UBICACION */
        .location {
            margin: 0 20px 20px 20px;
            display: flex;
            align-items: center;
            font-size: 14px;
            cursor: pointer;
        }
        .location i:first-child { color: #8b5a2b; margin-right: 8px; }
        .location span { font-weight: 600; }
        .location i:last-child { margin-left: 5px; font-size: 12px; }

        /* SECCIONES */
        .section-title {
            margin: 0 20px 20px 20px;
            font-size: 22px;
            font-weight: 700;
        }

        /* GRID PIEDRAS (Servicios Express) */
        .grid-express {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 0 20px;
            margin-bottom: 30px;
        }

        .btn-piedra {
            aspect-ratio: 1.3;
            background-color: #222;
            background-image: 
                radial-gradient(circle at 30% 30%, rgba(255,255,255,0.05) 0%, transparent 50%),
                url('https://www.transparenttextures.com/patterns/dark-matter.png');
            background-size: cover;
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            /* 🪨 EFECTO PIEDRA OSCURA Y RELIEVE */
            box-shadow: 
                0 15px 35px rgba(0,0,0,0.8),
                inset 0 -8px 15px rgba(0,0,0,0.6),
                inset 0 8px 15px rgba(255,255,255,0.05);
            border: 2px solid #111;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        /* Grietas de la piedra */
        .btn-piedra::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url('https://www.transparenttextures.com/patterns/cracked-earth.png');
            opacity: 0.3;
            pointer-events: none;
        }

        .btn-piedra:active {
            transform: scale(0.92) translateY(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.8);
        }
        
        /* 🏆 ICONOS DORADOS/METÁLICOS 3D */
        .btn-piedra i {
            font-size: 55px;
            margin-bottom: 12px;
            z-index: 1;
            /* ✨ EFECTO ORO REALISTA */
            background: linear-gradient(135deg, 
                #f5e5a6 0%, 
                #e1b342 25%, 
                #b8860b 50%, 
                #d4af37 75%, 
                #f5e5a6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.8)) brightness(1.2);
            position: relative;
        }

        /* Brillo extra en el icono */
        .btn-piedra i::after {
            content: '';
            position: absolute;
            top: -10%; left: -10%; width: 120%; height: 120%;
            background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, transparent 70%);
            z-index: -1;
            opacity: 0.5;
        }

        /* 🏷️ LETRAS METÁLICAS EN RELIEVE */
        .btn-piedra span {
            color: #d4af37;
            font-weight: 900;
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            z-index: 1;
            /* ✨ EFECTO METAL GRABADO */
            background: linear-gradient(to bottom, #f5e5a6, #b8860b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.9));
        }

        /* Variación para Iconos Plateados (Plomería/Limpieza) */
        .silver i, .silver span {
            background: linear-gradient(135deg, 
                #ffffff 0%, 
                #a0a0a0 25%, 
                #707070 50%, 
                #b0b0b0 75%, 
                #ffffff 100%);
            -webkit-background-clip: text;
        }

        /* GRID MADERAS (Categorías secundarias) */
        .grid-maderas {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 0 20px;
            margin-bottom: 25px;
        }

        .btn-madera {
            padding: 15px 10px;
            border-radius: 15px;
            text-decoration: none;
            color: var(--color-texto);
            font-weight: bold;
            text-align: center;
            font-size: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(139, 90, 43, 0.3);
            transition: transform 0.2s;
        }
        .btn-madera:active { transform: scale(0.98); }

        .madera-clara { background-image: url('/static/madera_clara.jpg'); background-size: cover; }
        .madera-media { background-image: url('/static/madera_media.jpg'); background-size: cover; }

        /* BOTONES LARGOS INFERIORES */
        .bottom-actions {
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn-largo {
            width: 100%;
            padding: 18px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 800;
            text-transform: uppercase;
            text-align: center;
            font-size: 17px;
            letter-spacing: 1px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
            border: 2px solid rgba(0,0,0,0.1);
        }

        .urgencia {
            background: linear-gradient(135deg, #e65c00, #f9d423); /* Naranja/Rojizo madera */
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .urgencia i { font-size: 20px; }

        .cotizar {
            background-image: url('/static/madera_clara.jpg');
            background-size: cover;
            color: var(--color-texto);
        }

    </style>
</head>
<body>

    <div class="app-container">
        <!-- Decoraciones -->
        <svg class="decoracion-esquina top-left" viewBox="0 0 100 100"><path d="M0,0 Q50,0 50,50 T100,100" fill="none" stroke="#5a3e2b" stroke-width="0.5"/></svg>
        <svg class="decoracion-esquina bottom-right" viewBox="0 0 100 100"><path d="M0,0 Q50,0 50,50 T100,100" fill="none" stroke="#5a3e2b" stroke-width="0.5"/></svg>

        <!-- Header -->
        <div class="header">
            <i class="fas fa-bars"></i>
            <div class="logo">okupo</div>
            {% if session.get('user_id') %}
                <a href="{{ url_for('logout') }}" title="Cerrar Sesión"><i class="fas fa-sign-out-alt"></i></a>
            {% else %}
                <a href="{{ url_for('login') }}"><i class="fas fa-user-circle"></i></a>
            {% endif %}
        </div>

        <!-- Buscador -->
        <div class="search-box">
            <i class="fas fa-search"></i>
            <span>Buscar</span>
        </div>

        <!-- Ubicación -->
        <div class="location" onclick="obtenerUbicacion()">
            <i class="fas fa-map-marker-alt"></i>
            <span id="ubicacion-texto">Cargando ubicación...</span>
            <i class="fas fa-chevron-down"></i>
        </div>

        <!-- Servicios Express (Piedra) -->
        <div class="section-title">Servicios Express</div>
        <div class="grid-express">
            <a href="/categorias/1/subcategorias" class="btn-piedra">
                <i class="fas fa-key"></i>
                <span>Cerrajería</span>
            </a>
            <a href="/categorias/2/subcategorias" class="btn-piedra">
                <i class="fas fa-faucet"></i>
                <span>Plomería</span>
            </a>
            <a href="/categorias/3/subcategorias" class="btn-piedra">
                <i class="fas fa-bolt"></i>
                <span>Electricidad</span>
            </a>
            <a href="/categorias/4/subcategorias" class="btn-piedra">
                <i class="fas fa-spray-can-sparkles"></i>
                <span>Limpieza</span>
            </a>
        </div>

        <!-- Otros Servicios (Madera) -->
        <div class="grid-maderas">
            <a href="/categorias/5/subcategorias" class="btn-madera madera-clara">Limpieza de Muebles</a>
            <a href="/categorias/6/subcategorias" class="btn-madera madera-media">Armado de Muebles</a>
            <a href="/categorias/7/subcategorias" class="btn-madera madera-clara">Albañilería y Pintura</a>
            <a href="/categorias/8/subcategorias" class="btn-madera madera-media">Fletes y Mudanzas</a>
        </div>

        <!-- Botones de Acción -->
        <div class="bottom-actions">
            <a href="#" class="btn-largo urgencia">
                <span>URGENCIA 24/7</span>
                <i class="fas fa-bolt"></i>
            </a>
            <a href="/categorias" class="btn-largo cotizar">
                COTIZAR OTRO SERVICIO
            </a>
        </div>

    </div>

    <!-- SCRIPTS -->
    <script>
        function obtenerUbicacion() {
            const span = document.getElementById('ubicacion-texto');
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        localStorage.setItem('okupo_lat', lat);
                        localStorage.setItem('okupo_lon', lon);

                        fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}`)
                            .then(response => response.json())
                            .then(data => {
                                const ubicacion = data.address.city || data.address.town || "Zapopan, Jalisco";
                                span.innerText = ubicacion;
                            })
                            .catch(() => {
                                span.innerText = `${lat.toFixed(2)}, ${lon.toFixed(2)}`;
                            });
                    },
                    () => { span.innerText = "Zapopan, Jalisco"; }
                );
            }
        }

        // Ejecutar al cargar
        document.addEventListener('DOMContentLoaded', () => {
            obtenerUbicacion();
            
            // Verificación de Token / Redirección (Simulado aquí, manejado por Flask)
            {% if session.get('token') == 'UNAUTHORIZED' %}
                window.location.href = "{{ url_for('login') }}";
            {% endif %}
        });
    </script>
</body>
</html>
