<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Okupo - Servicios Express</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #1c150f;
            color: #edeae3;
        }
        .btn-menu { color: #C69B6F; }
        .logo-accent { color: #C69B6F; }
        .bg-base-card { background-color: #2a221b; border: 1px solid #9E8B71; }
        .search-bar { background-color: #3d342c; border: 1px solid #9E8B71; color: #edeae3; }
        .search-bar::placeholder { color: #ADA391; }
        
        /* Colores específicos por categoría */
        .cat-cerrajeria { background-color: #C69B6F; color: #1c150f; }
        .cat-plomeria { background-color: #9E8B71; color: #1c150f; }
        .cat-electricidad { background-color: #ADA391; color: #1c150f; }
        .cat-limpieza { background-color: #C6B79F; color: #1c150f; }
        .cat-fletes { background-color: #D6CCB7; color: #1c150f; }
        .cat-albanileria { background-color: #DBD4C6; color: #1c150f; }
        
        .cat-card:hover { transform: scale(1.02); transition: transform 0.2s; }
    </style>
</head>
<body class="font-sans">

<!-- BARRA DE NAVEGACIÓN -->
<header class="bg-[#1c150f] shadow-md border-b border-[#9E8B71] sticky top-0 z-50">
    <div class="max-w-4xl mx-auto px-4 py-3 flex justify-between items-center">
        
        <button id="menuBtn" class="text-2xl btn-menu">
            <i class="fas fa-bars"></i>
        </button>

        <a href="/" class="text-3xl font-bold tracking-tighter">
            <span class="logo-accent">o</span>kupo
        </a>

        {% if session.user_id %}
            <a href="{{ url_for('mis_pedidos') }}" class="text-3xl btn-menu">
                <i class="fas fa-user-circle"></i>
            </a>
        {% else %}
            <a href="{{ url_for('login') }}" class="text-3xl btn-menu">
                <i class="fas fa-sign-in-alt"></i>
            </a>
        {% endif %}
    </div>
</header>

<main class="max-w-4xl mx-auto px-4 py-6">

    <!-- BARRA DE BÚSQUEDA -->
    <div class="mt-4 relative">
        <input type="text" placeholder="Buscar servicios..." 
               class="search-bar w-full px-4 py-4 rounded-full focus:outline-none focus:ring-2 focus:ring-[#C69B6F]">
        <button class="absolute right-4 top-1/2 -translate-y-1/2 text-[#C69B6F] text-xl">
            <i class="fas fa-search"></i>
        </button>
    </div>

    <h2 class="mt-10 text-3xl font-bold mb-6">Categorías Principales</h2>

    <!-- GRID DE CATEGORÍAS PRINCIPALES -->
    <div class="grid grid-cols-2 gap-5 mb-10">

        <!-- Cerrajería -->
        <a href="{{ url_for('ver_subcategorias', categoria_id=1) }}" class="cat-card cat-cerrajeria p-8 rounded-3xl flex flex-col items-center text-center shadow-lg">
            <div class="text-6xl mb-4"><i class="fas fa-key"></i></div>
            <h4 class="font-bold text-2xl">Cerrajería</h4>
        </a>

        <!-- Plomería -->
        <a href="{{ url_for('ver_subcategorias', categoria_id=2) }}" class="cat-card cat-plomeria p-8 rounded-3xl flex flex-col items-center text-center shadow-lg">
            <div class="text-6xl mb-4"><i class="fas fa-faucet"></i></div>
            <h4 class="font-bold text-2xl">Plomería</h4>
        </a>

        <!-- Electricidad -->
        <a href="{{ url_for('ver_subcategorias', categoria_id=3) }}" class="cat-card cat-electricidad p-8 rounded-3xl flex flex-col items-center text-center shadow-lg">
            <div class="text-6xl mb-4"><i class="fas fa-bolt"></i></div>
            <h4 class="font-bold text-2xl">Electricidad</h4>
        </a>

        <!-- Limpieza -->
        <a href="{{ url_for('ver_subcategorias', categoria_id=4) }}" class="cat-card cat-limpieza p-8 rounded-3xl flex flex-col items-center text-center shadow-lg">
            <div class="text-6xl mb-4"><i class="fas fa-broom"></i></div>
            <h4 class="font-bold text-2xl">Limpieza</h4>
        </a>

    </div>

    <h2 class="text-2xl font-bold mb-4 opacity-80">Otros Servicios</h2>

    <!-- OTROS SERVICIOS -->
    <div class="grid grid-cols-2 gap-4 mb-8">
        <a href="#" class="cat-card cat-fletes py-5 px-4 rounded-2xl text-center font-bold text-lg shadow-md">
            <i class="fas fa-truck mr-2"></i> Fletes
        </a>
        <a href="#" class="cat-card cat-albanileria py-5 px-4 rounded-2xl text-center font-bold text-lg shadow-md">
            <i class="fas fa-hammer mr-2"></i> Albañilería
        </a>
    </div>

    <!-- BOTÓN URGENCIA -->
    <a href="#" class="mt-4 block bg-red-700 text-white rounded-3xl py-6 text-center font-bold text-2xl shadow-2xl flex items-center justify-center gap-4 hover:bg-red-600 transition">
        Urgencia 24/7 <i class="fas fa-bolt text-yellow-300"></i>
    </a>

</main>

<script>
    const menuBtn = document.getElementById('menuBtn');
    menuBtn.addEventListener('click', function() {
        {% if session.user_id %}
            window.location.href = "{{ url_for('mis_pedidos') }}";
        {% else %}
            window.location.href = "{{ url_for('login') }}";
        {% endif %}
    });
</script>

</body>
</html>
