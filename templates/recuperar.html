<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contrasenna - Okupo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9fafb;
        }
        .btn-recuperar {
            background-color: #f97316;
        }
        .btn-recuperar:hover {
            background-color: #ea580c;
        }
    </style>
</head>
<body>

<div class="min-h-screen flex flex-col items-center justify-center py-8 px-4 max-w-md mx-auto">

    <!-- LOGO -->
    <div class="mb-8 text-center">
        <h1 class="text-6xl font-bold">
            <span class="text-orange-500">o</span><span class="text-blue-600">k</span><span class="text-orange-500">u</span><span class="text-blue-600">p</span><span class="text-orange-500">o</span>
        </h1>
        <p class="text-gray-500 mt-2">Recupera tu acceso</p>
    </div>

    <!-- FORMULARIO -->
    <form action="/recuperar" method="POST" class="w-full bg-white p-8 rounded-2xl shadow-lg">
        
        <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Olvidé mi contrasenna</h2>

        <p class="text-gray-600 text-center mb-6">Ingresa tu correo electrónico y te enviaremos las instrucciones.</p>

        <!-- EMAIL -->
        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-1">Correo Electrónico</label>
            <input type="email" name="email" required 
                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        </div>

        <!-- BOTÓN -->
        <button type="submit" class="btn-recuperar w-full text-white font-bold py-3 rounded-lg text-lg">
            Enviar Instrucciones
        </button>

        <!-- LINK A LOGIN -->
        <p class="text-center text-sm text-gray-600 mt-6">
            <a href="/login" class="text-blue-600 font-bold">← Volver al inicio de sesión</a>
        </p>

    </form>

</div>

</body>
</html>
