<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta - Okupo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9fafb;
        }
        .btn-registrar {
            background-color: #f97316;
        }
        .btn-registrar:hover {
            background-color: #ea580c;
        }
    </style>
</head>
<body>

<div class="min-h-screen flex flex-col items-center justify-center py-8 px-4 max-w-md mx-auto">

    <!-- LOGO -->
    <div class="mb-8 text-center">
        <h1 class="text-6xl font-bold">
            <span class="text-orange-500">o</span><span class="text-blue-600">k</span><span class="text-orange-500">u</span><span class="text-blue-600">p</span><span class="text-orange-500">o</span>
        </h1>
        <p class="text-gray-500 mt-2">¡Crea tu cuenta!</p>
    </div>

    <!-- FORMULARIO -->
    <form action="/registro" method="POST" class="w-full bg-white p-8 rounded-2xl shadow-lg">
        
        <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Registro</h2>

        <!-- NOMBRE -->
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">Nombre Completo</label>
            <input type="text" name="nombre" required 
                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        </div>

        <!-- EMAIL -->
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">Correo Electrónico</label>
            <input type="email" name="email" required 
                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        </div>
        <!-- TELÉFONO -->
        <div class="mb-4">
            <label class="block text-gray-700 font-bold mb-2">Teléfono</label>
            <input type="text" name="telefono" required
                   class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <!-- PASSWORD -->
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
            <input type="password" name="contrasena" required 
                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        </div>
         <!-- CONFIRMAR CONTRASEÑA -->
<div class="mb-6">
    <label class="block text-sm font-medium text-gray-700 mb-1">Confirmar Contraseña</label>
    <input type="password" name="confirmar_password" required 
        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
</div>

        <!-- TIPO DE USUARIO -->
        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-1">¿Qué eres?</label>
            <select name="tipo_usuario" required 
                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                <option value="cliente">Cliente</option>
                <option value="trabajador">Trabajador</option>
            </select>
        </div>

        <!-- BOTÓN -->
        <button type="submit" class="btn-registrar w-full text-white font-bold py-3 rounded-lg text-lg">
            Crear Cuenta
        </button>

        <!-- LINK A LOGIN -->
        <p class="text-center text-sm text-gray-600 mt-6">
            ¿Ya tienes cuenta? <a href="/login" class="text-blue-600 font-bold">Inicia sesión aquí</a>
        </p>

    </form>

</div>

</body>
</html>
