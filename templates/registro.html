<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta - Okupo</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --color-crema: #fdfaf5;
            --color-texto: #5a3e2b;
            --color-dorado: #d4af37;
        }

        /* 🛠️ FUERZA EL FONDO Y ELIMINA CUALQUIER RASTRO DE NEGRO */
        html, body {
            background-color: var(--color-crema) !important;
            margin: 0; padding: 0; width: 100%; height: 100%;
        }

        body {
            background-image: url('/static/fondo_pared.jpg') !important;
            background-size: cover !important;
            background-attachment: fixed !important;
            background-position: center !important;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--color-texto);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .registro-card {
            width: 90%;
            max-width: 400px;
            background: var(--color-crema) !important;
            background-image: url('https://www.transparenttextures.com/patterns/cream-paper.png') !important;
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
            border: 2px solid rgba(139, 90, 43, 0.3);
            position: relative;
        }

        .logo {
            font-size: 45px;
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 5px;
            color: var(--color-texto);
        }

        h2 {
            font-size: 18px;
            margin-bottom: 35px;
            opacity: 0.8;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: 800;
            margin-bottom: 8px;
            margin-left: 5px;
            text-transform: uppercase;
            color: var(--color-texto);
        }

        .input-group input {
            width: 100%;
            padding: 15px 20px;
            border-radius: 15px;
            border: 1px solid #d4c5b3;
            background: rgba(255,255,255,0.7);
            box-sizing: border-box;
            font-size: 16px;
            color: var(--color-texto);
            transition: all 0.2s;
        }

        .input-group input:focus {
            border-color: var(--color-texto);
            outline: none;
            background: white;
            box-shadow: 0 0 0 3px rgba(139, 90, 43, 0.1);
        }

        .btn-registro {
            width: 100%;
            padding: 18px;
            background-image: url('/static/madera_media.jpg');
            background-size: cover;
            border: 2px solid rgba(0,0,0,0.1);
            border-radius: 15px;
            color: var(--color-texto);
            font-size: 18px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            margin-top: 10px;
            text-transform: uppercase;
        }
        .btn-registro:active { transform: scale(0.98); }

        .footer-links {
            margin-top: 30px;
            font-size: 14px;
            color: #fdfaf5;
            opacity: 0.9;
        }

        .footer-links a {
            color: #fdfaf5;
            font-weight: 800;
            text-decoration: underline;
        }

        /* Badge dinámico para indicar rol */
        .role-badge {
            display: inline-block;
            padding: 5px 15px;
            background: var(--color-dorado);
            color: white;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="registro-card">
        <div class="logo">okupo</div>
        
        {% if request.args.get('rol') == 'colaborador' %}
            <div class="role-badge">Cuenta de Técnico</div>
            <h2>Únete a los mejores</h2>
        {% else %}
            <h2>Crea tu cuenta</h2>
        {% endif %}

        <form action="{{ url_for('autenticacion.registro') }}" method="POST">
            <!-- Pasamos el rol como campo oculto -->
            <input type="hidden" name="rol" value="{{ request.args.get('rol', 'cliente') }}">

            <div class="input-group">
                <label>Nombre Completo</label>
                <input type="text" name="nombre" placeholder="Ej: Juan Pérez" required>
            </div>

            <div class="input-group">
                <label>Correo Electrónico</label>
                <input type="email" name="correo" placeholder="correo@ejemplo.com" required>
            </div>

            <div class="input-group">
                <label>Contraseña</label>
                <input type="password" name="contrasenna" placeholder="••••••••" required>
            </div>

            <div class="input-group">
                <label>Confirmar Contraseña</label>
                <input type="password" name="confirmar_contrasenna" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-registro">Registrarme</button>
        </form>

        <div class="footer-links">
            ¿Ya tienes cuenta? <a href="{{ url_for('autenticacion.login') }}">Inicia sesión</a>
        </div>
    </div>

</body>
</html>
