<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendar Visita Técnica - Okupo</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --color-crema: #fdfaf5;
            --color-texto: #5a3e2b;
            --color-dorado: #d4af37;
            --color-naranja: #ff8c00;
        }

        /* 🛠️ ESTILO UNIFICADO "OKUPO" */
        html, body {
            background-color: var(--color-crema) !important;
            margin: 0; padding: 0; width: 100%; height: 100%;
        }

        body {
            background-image: url('/static/fondo_pared.jpg') !important;
            background-size: cover !important;
            background-attachment: fixed !important;
            background-position: center !important;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--color-texto);
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            min-height: 100vh;
            background: transparent !important;
            position: relative;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        .header {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
        }
        .header a { color: var(--color-texto); font-size: 24px; text-shadow: 0 0 8px white; }
        .header h1 { flex: 1; font-size: 18px; font-weight: 900; text-transform: uppercase; text-shadow: 0 0 10px white; margin: 0; }

        .form-card {
            background: rgba(253, 250, 245, 0.95);
            background-image: url('https://www.transparenttextures.com/patterns/cream-paper.png');
            border-radius: 35px;
            padding: 30px 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 2px solid var(--color-dorado);
            text-align: left;
        }

        .input-group {
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: 900;
            margin-bottom: 10px;
            text-transform: uppercase;
            color: var(--color-texto);
            letter-spacing: 1px;
        }

        .input-group input {
            width: 100%;
            padding: 18px;
            border-radius: 18px;
            border: 1px solid #ddd;
            background: white;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 16px;
            font-weight: 700;
            outline: none;
            color: var(--color-texto);
        }

        .input-group input:focus { border-color: var(--color-dorado); box-shadow: 0 0 10px rgba(212, 175, 55, 0.2); }

        .metodo-pago {
            background: white;
            border: 2px solid var(--color-dorado);
            border-radius: 20px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 10px;
        }
        .metodo-pago i { font-size: 24px; color: var(--color-dorado); }
        .metodo-pago div { font-size: 14px; font-weight: 800; }

        .btn-confirmar {
            width: 100%;
            padding: 20px;
            background-image: url('/static/piedra_boton.png');
            background-size: cover;
            border: 2px solid var(--color-texto);
            border-radius: 25px;
            color: var(--color-dorado);
            text-shadow: 0 1px 3px black;
            font-size: 18px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: 30px;
            transition: transform 0.2s;
        }
        .btn-confirmar:active { transform: scale(0.95); }

    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <a href="javascript:history.back()"><i class="fas fa-arrow-left"></i></a>
            <h1>Agenda tu Visita</h1>
        </div>

        <form action="{{ url_for('pedidos.mis_pedidos') }}" method="POST" class="form-card">
            <div class="input-group">
                <label><i class="fas fa-calendar-alt"></i> ¿Cuándo puede ir el experto?</label>
                <input type="date" name="fecha_visita" id="fecha_visita" required>
            </div>

            <div class="input-group">
                <label><i class="fas fa-clock"></i> ¿En qué horario?</label>
                <input type="time" name="hora_visita" id="hora_visita" required>
            </div>

            <div class="input-group">
                <label>Método de Pago para la Visita ($400)</label>
                <div class="metodo-pago">
                    <i class="fas fa-credit-card"></i>
                    <div>
                        Pago Seguro con Tarjeta<br>
                        <span style="font-size: 10px; opacity: 0.6; text-transform: none;">Visa, Mastercard, Amex</span>
                    </div>
                    <i class="fas fa-chevron-right" style="margin-left: auto; font-size: 12px; opacity: 0.4;"></i>
                </div>
            </div>

            <button type="submit" class="btn-confirmar">Confirmar y Pagar</button>
        </form>

        <p style="margin-top: 25px; font-size: 11px; opacity: 0.6; line-height: 1.4; color: white; text-shadow: 1px 1px 2px black;">
            * El cargo se realizará de forma inmediata para asegurar la cita.<br>
            Recibirás el contacto del técnico tras el pago.
        </p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const hoy = new Date().toISOString().split('T')[0];
            document.getElementById('fecha_visita').setAttribute('min', hoy);
            document.getElementById('fecha_visita').value = hoy;
        });
    </script>
</body>
</html>
