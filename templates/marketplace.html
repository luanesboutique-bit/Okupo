<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profesionales - Okupo</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --color-crema: #fdfaf5;
            --color-texto: #5a3e2b;
            --color-dorado: #d4af37;
        }

        body {
            background-color: var(--color-crema);
            background-image: url('https://www.transparenttextures.com/patterns/cream-paper.png');
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--color-texto);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            min-height: 100vh;
            background: var(--color-crema);
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            padding-bottom: 30px;
        }

        .header {
            padding: 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(139, 90, 43, 0.1);
        }
        .header a { color: var(--color-texto); font-size: 22px; margin-right: 20px; }
        .header h1 { font-size: 20px; margin: 0; font-weight: 700; }

        .list-container {
            padding: 15px;
        }

        .card-colaborador {
            background: white;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 1px solid #eee;
        }

        .avatar {
            width: 60px;
            height: 60px;
            background-image: url('/static/piedra_boton.png');
            background-size: cover;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-dorado);
            font-size: 30px;
            border: 2px solid var(--color-texto);
        }

        .info {
            flex: 1;
        }

        .info h3 {
            margin: 0;
            font-size: 18px;
            font-weight: bold;
        }

        .info .rating {
            color: #f1c40f;
            font-size: 12px;
            margin: 3px 0;
        }

        .info .distancia {
            font-size: 12px;
            opacity: 0.6;
        }

        .btn-elegir {
            background-image: url('/static/madera_media.jpg');
            background-size: cover;
            color: var(--color-texto);
            padding: 8px 15px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            border: 1px solid rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <a href="javascript:history.back()"><i class="fas fa-arrow-left"></i></a>
            <h1>Elegir Profesional</h1>
        </div>

        <div class="list-container">
            {% for col in colaboradores %}
            <div class="card-colaborador">
                <div class="avatar">
                    <i class="fas fa-user-circle"></i>
                </div>
                <div class="info">
                    <h3>{{ col.nombre }}</h3>
                    <div class="rating">
                        <i class="fas fa-star"></i>
                        <i class="fas fa-star"></i>
                        <i class="fas fa-star"></i>
                        <i class="fas fa-star"></i>
                        <i class="fas fa-star-half-alt"></i>
                        <span style="color: var(--color-texto); opacity: 0.6; margin-left: 5px;">4.5</span>
                    </div>
                    <div class="distancia">
                        <i class="fas fa-map-marker-alt"></i> a {{ col.distancia_km or '2.5' }}km de ti
                    </div>
                </div>
                <a href="{{ url_for('pedidos.pedir', colaborador_id=col.colaborador_id, subcategoria_id=subcat_id) }}" class="btn-elegir">
                    Elegir
                </a>
            </div>
            {% else %}
            <div style="text-align: center; margin-top: 50px; opacity: 0.5;">
                <i class="fas fa-user-slash" style="font-size: 40px; margin-bottom: 15px; display: block;"></i>
                No hay profesionales disponibles en tu zona ahora mismo.
            </div>
            {% endfor %}
        </div>
    </div>

</body>
</html>
